<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfcfe" />

    <!-- Favicon — the Suize master mark. -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta
      name="description"
      content="Your static site goes live on Walrus with one gasless USDC payment, shipped by your agent. Whoever pays owns it on-chain. No account, no API keys."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Suize" />
    <meta property="og:url" content="https://suize.io/" />
    <meta property="og:title" content="Suize: websites on Walrus, shipped by your agent" />
    <meta
      property="og:description"
      content="Websites on Walrus, shipped by your agent. One gasless USDC payment and your static site goes live, owned on-chain by whoever paid."
    />
    <meta property="og:image" content="https://suize.io/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Suize: websites on Walrus, shipped by your agent" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Suize: websites on Walrus, shipped by your agent" />
    <meta
      name="twitter:description"
      content="One gasless USDC payment and your static site goes live on Walrus, owned on-chain by whoever paid."
    />
    <meta name="twitter:image" content="https://suize.io/og.png" />

    <!--
      THE BROADSHEET TRIAD — SELF-HOSTED (no Google Fonts CDN link, per house law):
        Space Grotesk = grotesk UI / eyebrows / button words / the display nameplate;
        Martian Mono  = the mono — every id / size / count / url;
        Newsreader    = editorial serif — headlines, kickers, ledes.
      @font-face lives in src/styles.css; the woff2 files are vendored under
      /public/fonts (latin subset, variable). Preload the two most above-the-fold.
    -->
    <link
      rel="preload"
      href="/fonts/SpaceGrotesk.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/Newsreader.woff2" as="font" type="font/woff2" crossorigin />

    <title>Suize: websites on Walrus, shipped by your agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
