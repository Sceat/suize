<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfcfe" />

    <!-- Favicon — the Suize master mark. -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta
      name="description"
      content="Suize — the publish button for the agentic web. An agent pays fifty cents in USDC over an HTTP 402 challenge and a website goes live on Walrus, content-addressed and non-custodial."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Suize" />
    <meta property="og:url" content="https://suize.io/" />
    <meta property="og:title" content="Suize — The Dispatch" />
    <meta
      property="og:description"
      content="An agent pays. A website goes live. Pressed to Walrus, settled on Sui — yours to keep, extend, or let expire."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Suize — The Dispatch" />
    <meta
      name="twitter:description"
      content="An agent pays. A website goes live. Pressed to Walrus, settled on Sui."
    />

    <!--
      THE BROADSHEET TRIAD — SELF-HOSTED (no Google Fonts CDN link, per house law):
        Space Grotesk = grotesk UI / eyebrows / button words / the display nameplate;
        Martian Mono  = the mono — every id / size / count / url;
        Newsreader    = editorial serif — headlines, kickers, ledes.
      @font-face lives in src/styles.css; the woff2 files are vendored under
      /public/fonts (latin subset, variable). Preload the two most above-the-fold.
    -->
    <link
      rel="preload"
      href="/fonts/SpaceGrotesk.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/Newsreader.woff2" as="font" type="font/woff2" crossorigin />

    <title>Suize — The Dispatch</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
