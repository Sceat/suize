<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fbfcfe" />

    <title>Suize — the AI wallet that makes life easier</title>
    <meta
      name="description"
      content="Talk to your wallet. It remembers you, books the flight, renews the subscription, orders dinner — and pays. You just approve. And any business can get paid by AI agents in one line."
    />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Suize" />
    <meta property="og:url" content="https://suize.io/" />
    <meta
      property="og:title"
      content="Suize — the AI wallet that makes life easier"
    />
    <meta
      property="og:description"
      content="Talk to your wallet. It remembers you, books the flight, renews the subscription, orders dinner — and pays. You just approve. And any business can get paid by AI agents in one line."
    />
    <meta property="og:image" content="https://suize.io/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1600" />
    <meta property="og:image:height" content="900" />
    <meta
      property="og:image:alt"
      content="Suize — the AI wallet that makes life easier."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Suize — the AI wallet that makes life easier"
    />
    <meta
      name="twitter:description"
      content="Talk to your wallet. It books the flight, renews the subscription, orders dinner — and pays. You just approve."
    />
    <meta name="twitter:image" content="https://suize.io/og.png" />

    <!-- A door for agents: the machine-readable description of Suize. -->
    <link
      rel="alternate"
      type="text/markdown"
      title="llms.txt"
      href="/llms.txt"
    />

    <!-- THE BROADSHEET TRIAD (Google Fonts) — shared with Crash + Deploy:
         Space Grotesk = grotesk UI / eyebrows / button words / nav / body;
         Martian Mono  = the mono — every amount / id / url / price;
         Newsreader    = editorial serif — titles, kickers, numerals.
         --sans / --mono / --serif in styles.css point at these. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Martian+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
