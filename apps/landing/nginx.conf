server {
  listen       8080;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Compression — Cloudflare also gzips, but doing it here saves the edge
  # round-trip on cache misses.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Long-cache hashed assets (Vite emits content-hashed filenames in /assets)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Short-cache anything else static at the root (favicon, og images, etc.)
  location ~* \.(svg|png|jpg|jpeg|webp|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # SPA fallback — never serve a stale index, but cache it on the client only briefly
  location / {
    add_header Cache-Control "public, max-age=60";
    try_files $uri $uri/ /index.html;
  }

  # Common hardening
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Don't leak nginx version
  server_tokens off;
}
