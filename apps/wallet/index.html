    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Suize" />
    <meta property="og:url" content="https://wallet.suize.io/" />
    <meta property="og:title" content="Suize — your money, without banks" />
    <meta property="og:description" content="The AI wallet that works for you — your money, without banks, on Sui." />

    <!-- Twitter -->

    <meta name="twitter:title" content="Suize — your money, without banks" />
    <meta name="twitter:description" content="The AI wallet that works for you — your money, without banks, on Sui." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Pre-paint theme: read localStorage['suize-theme'] (default 'light') and set
      // <html data-theme> BEFORE app JS, so there's no flash. The ThemeProvider then
      // mirrors this attribute into React state and rewrites theme-color on toggle.
      (function () {
        try {
          var t = localStorage.getItem('suize-theme');
          document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light';
          if (t === 'dark') {
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', '#04070e');
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
