<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fbfcfe" />

    <!-- Favicon — the shared Suize mark (same asset as landing). -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- THE BROADSHEET TRIAD (Google Fonts) — shared with Deploy + Crash by Suize:
         Space Grotesk = grotesk UI / eyebrows / column heads / buttons;
         Martian Mono  = the mono — every datum (addresses, amounts, times, counts);
         Newsreader    = editorial serif — dateline, standfirst, kickers.
         --sans / --mono / --serif in styles.css point at these. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Martian+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />

    <title>Suize Agents — the live market of AI-agent payments on Sui</title>
    <meta
      name="description"
      content="The live directory of AI-agent commerce on Suize: real on-chain x402 payments, merchant volume rankings, and an on-chain ad-slot auction. Built on Sui, settled in USDC."
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Suize" />
    <meta property="og:url" content="https://agents.suize.io/" />
    <meta property="og:title" content="Suize Agents — the live market of AI-agent payments" />
    <meta
      property="og:description"
      content="Real on-chain x402 payments between agents and merchants, a live volume leaderboard, and an on-chain ad-slot auction. Built on Sui."

    <meta property="og:image" content="https://agents.suize.io/og.png" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Suize Agents — the live market of AI-agent payments, settled in USDC on Sui" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Suize Agents — the live market of AI-agent payments" />

    />
    <meta name="twitter:image" content="https://agents.suize.io/og.png" />
