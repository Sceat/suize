<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fbfcfe" />

    <!-- Favicon — the PolySui product mark. -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta name="description" content="PolySui — one-tap Bitcoin up or down on Sui. No wallet, no gas. Read the tide and take a side." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PolySui" />
    <meta property="og:url" content="https://polysui.suize.io/" />
    <meta property="og:title" content="PolySui — read the tide" />
    <meta property="og:description" content="One-tap Bitcoin up or down on Sui. No wallet, no gas — just read the tide and take a side." />
    <meta property="og:image" content="https://polysui.suize.io/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PolySui — read the tide of Bitcoin on Sui" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PolySui — read the tide" />
    <meta name="twitter:description" content="One-tap Bitcoin up or down on Sui. No wallet, no gas — just read the tide and take a side." />
    <meta name="twitter:image" content="https://polysui.suize.io/og.png" />
    <!-- THE BROADSHEET TRIAD (Google Fonts):
         Space Grotesk = grotesk UI / eyebrows / button words / chips / body;
         Martian Mono  = the money — EVERY number (balance, WIN, TVL, timer…);
         Newsreader    = editorial serif — masthead titles, kickers, reframe.
         --sans / --mono / --serif in styles.css point at these. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Martian+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <!-- LOCAL LOGO FONT — preload the CRASH wordmark above-the-fold. Its
         @font-face lives in styles.css. Logo only, never body/UI. -->
    <link
      rel="preload"
      href="/fonts/Hashgraph-Title.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>PolySui — read the tide</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
