<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fbfcfe" />

    <!-- Favicon — the Deploy product mark. -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta
      name="description"
      content="Suize Deploy — the agent-native Vercel for Sui. POST a built static site, it goes live on Walrus at a free subdomain."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Suize" />
    <meta property="og:url" content="https://deploy.suize.io/" />
    <meta property="og:title" content="Deploy · by Suize" />
    <meta property="og:description" content="Let your agent deploy sites to Walrus in seconds. Gasless." />
    <meta property="og:image" content="https://deploy.suize.io/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Deploy by Suize — the agent-native Vercel for Sui" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Deploy · by Suize" />
    <meta name="twitter:description" content="Let your agent deploy sites to Walrus in seconds. Gasless." />
    <meta name="twitter:image" content="https://deploy.suize.io/og.png" />

    <!-- THE BROADSHEET TRIAD (Google Fonts) — shared with Crash by Suize:
         Space Grotesk = grotesk UI / eyebrows / button words / chips / body;
         Martian Mono  = the mono — every id / size / count / url;
         Newsreader    = editorial serif — masthead titles, kickers.
         --sans / --mono / --serif in styles.css point at these. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Martian+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <title>Deploy · by Suize</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
