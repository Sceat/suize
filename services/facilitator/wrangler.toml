# x402 Sui facilitator — Cloudflare Worker.
#
# Everything here is NON-secret operator config (there are NO secrets: the facilitator
# holds no key — it simulates and broadcasts payer-signed txs). Copy this file, set
# FEE_TREASURY to your own address or SuiNS name, and `wrangler deploy`.
#
# For local dev, put overrides in `.dev.vars` (gitignored) — see `.dev.vars.example`.

name = "x402-sui-facilitator"
main = "src/index.ts"
compatibility_date = "2025-05-05"
# The @mysten/sui gRPC client uses Node built-ins (Buffer, etc.); nodejs_compat provides them.
compatibility_flags = ["nodejs_compat"]

[vars]
# Which Sui network to settle on: "testnet" or "mainnet" (anything else → testnet).
SUI_NETWORK = "testnet"

# The default fee, in basis points (200 = 2%). Per-merchant overrides go in MERCHANT_RATES.
FEE_BPS = "200"

# The minimum fee, in atomic USDC units (6 decimals): 10000 = $0.01. The fee for a
# payment is min(max(amount * FEE_BPS / 10000, FEE_FLOOR), amount - 1).
FEE_FLOOR = "10000"

# REQUIRED — where the fee lands. CHANGE THIS before deploying. Either:
#   • a plain 0x… Sui address (used as-is), or
#   • a SuiNS name (e.g. "treasury@your-org" or "your-org.sui"), resolved live over gRPC,
#     cached hourly, and FAIL-CLOSED (an unresolved name means no payment settles).
# The template value below is an unresolvable placeholder ON PURPOSE — if you forget to
# change it, the facilitator refuses every payment rather than mis-routing your fees.
FEE_TREASURY = "treasury@example"

# Optional — a JSON map of per-merchant rate overrides. NO free tier: a merchant NOT in
# the map pays FEE_BPS; the fee is never waived. A malformed entry is skipped (logged).
#   MERCHANT_RATES = '{"0x<merchant-address>":{"feeBps":100}}'

# Optional — override the gRPC base url (defaults to the public fullnode for SUI_NETWORK).
#   SUI_GRPC_URL = "https://fullnode.testnet.sui.io:443"

# ---------------------------------------------------------------------------
# MAINNET (generic open-source TEMPLATE — NOT Suize's live instance).
# `wrangler deploy --env mainnet` deploys the worker `x402-sui-facilitator`
# with NO route; it exists so an outside operator can settle on mainnet by
# copying this file and pointing FEE_TREASURY at THEIR OWN treasury. The
# `treasury@example` value below is the unresolvable placeholder ON PURPOSE — it
# fails closed (no payment settles) so a forgotten edit never mis-routes fees;
# do NOT set it to a live treasury here.
# Suize's OWN mainnet facilitator is [env.suize] below (it owns the
# facilitator.suize.io route + treasury@suize). This env is UNUSED by Suize and
# left as the public template.
# ---------------------------------------------------------------------------
[env.mainnet.vars]
SUI_NETWORK = "mainnet"
FEE_BPS = "200"
FEE_FLOOR = "10000"
FEE_TREASURY = "treasury@example"

# ---------------------------------------------------------------------------
# SUIZE'S OWN INSTANCE (`wrangler deploy --env suize`) — the same open worker,
# configured: this is exactly the operator story above, dogfooded. It owns the
# facilitator.suize.io route. The fee is deliberately NONZERO (2% / $0.01 floor)
# and the treasury is the live SuiNS name `treasury@suize`, resolved on-chain
# hourly, fail-closed. This is Suize's LIVE production facilitator and now
# settles on MAINNET (2026-07 full mainnet cutover). Keyless + stateless — it
# holds no key and needs NO mainnet-specific secret; the only network knob is
# SUI_NETWORK below (USDC type, gRPC fullnode, and CAIP-2 id all derive from it).
# ---------------------------------------------------------------------------
[env.suize]
name = "x402-sui-facilitator-suize"
routes = [
  { pattern = "facilitator.suize.io", custom_domain = true },
]

[env.suize.vars]
# MAINNET cutover: was "testnet". Flipping this to "mainnet" is the whole flip —
# same route, same treasury@suize, same FEE_BPS all stay intact.
SUI_NETWORK = "mainnet"
FEE_BPS = "200"
FEE_FLOOR = "10000"
FEE_TREASURY = "treasury@suize"
