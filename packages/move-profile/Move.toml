[package]
name = "suize_profile"
edition = "2024"
version = "0.0.1"

# Framework-only: BusinessProfile uses object / transfer / event / balance / display /
# package (Object Display + Publisher). No vendored protocol deps. Pinned to
# framework/testnet (same as the other Suize Move packages, the rev where Address
# Balances shipped `balance::send_funds`).
[dependencies]
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "framework/testnet" }

[addresses]
profile = "0x0"
