[package]
name = "suize_subs"
edition = "2024"
version = "0.0.1"

# Framework-only package: `suize_subs` calls NOTHING beyond the Sui framework
# (object / transfer / event / balance / clock / party). No vendored protocol
# deps. MoveStdlib is auto-injected as a transitive dep of Sui. Pinned to
# `framework/testnet` to match our deployment target — same pin as move-deploy
# and move-wallet, and the rev where Address Balances shipped
# `balance::send_funds` + `transfer::party_transfer` (both required here).
[dependencies]
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "framework/testnet" }

[addresses]
subs = "0x0"
