[package]
name = "deepbook"
edition = "2024.beta"
version = "0.0.1"

# Transitive dep of predict; we never call deepbook directly. Use the vendored
# local token (instead of a mutable git rev) so the build is fully offline and
# reproducible.
[dependencies]
token = { local = "../token" }

[addresses]
deepbook = "0x0"
