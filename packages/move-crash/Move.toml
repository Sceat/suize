[package]
name = "crash_sui"
edition = "2024.beta"
version = "0.0.1"

# Dependencies are vendored under ./deps (clones of the predict-testnet-4-16
# branch of MystenLabs/deepbookv3). The `deepbook_predict` package has its
# `published-at` pinned to the LIVE testnet publish
# (0xf5ea2b37...c785138) so our router LINKS against the on-chain package
# rather than republishing it. deepbook + token are transitive deps of predict
# that we never call directly; they compile as bundled source but do not leak
# into the router ABI (verified on-chain).
[dependencies]
deepbook_predict = { local = "deps/predict" }

[addresses]
crash_sui = "0x0"
